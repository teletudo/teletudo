    <!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tele Tudo</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffb6c1;
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: #000;
      text-align: center;
    }

    .topo {
      width: 100%;
      display: block;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 0 20px 40px;
      box-sizing: border-box;
    }

    .botao-imagem {
      width: 100%;
      max-width: 640px;
      display: block;
      margin: 10px auto 25px auto;
    }

    .botao-imagem img {
      width: 100%;
      display: block;
    }

    .aviso {
      font-weight: bold;
      font-size: 14px;
      line-height: 1.5;
      margin: 15px 0 50px;
    }

    .texto-email {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .setas {
      display: block;
      margin-top: 8px;
      font-size: 22px;
    }

    .email-box {
      width: 100%;
      max-width: 520px;
      padding: 18px;
      font-size: 16px;
      font-family: Arial, sans-serif;
      border: 4px solid #000;
      border-radius: 20px;
      box-sizing: border-box;
      margin-bottom: 18px;
      color: #000;
      background: #fff;
      text-align: left;
    }

    .botao-enviar {
      width: 100%;
      max-width: 520px;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #000;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>

  <img src="topo01.png" alt="Tele Tudo" class="topo" />

  <div class="container">
    <div class="botao-imagem">
      <a href="https://t.me/+sXreo1O5RgRhYTgx" target="_blank">
        <img src="botao01.png" alt="Entrar no Telegram">
      </a>
    </div>

    <p class="aviso">
      🚨Para acessar o grupo com as mídias deve ter instalado no seu telefone o Telegram!
    </p>

    <p class="texto-email">
      Cadastre seu email e receba a lista dos melhores grupos
      <span class="setas">⏬⏬⏬⏬⏬⏬</span>
    </p>

    <form action="https://script.google.com/macros/s/AKfycbzjX_kCwHZdDC3uGImem0U66mmcBDr1oVSrdMze00g9EDMAQFS-N2vuF79Q_xskZBI/exec" method="POST" target="_blank">
      <input 
        type="email" 
        name="email" 
        placeholder="Digite seu e-mail"
        class="email-box"
        required
      >

      <button type="submit" class="botao-enviar">
        ENVIAR
      </button>
    </form>
  </div>

</body>
</html>
