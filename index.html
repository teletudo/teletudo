<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tele Tudo</title>  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffb6c1;
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: #000000;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
    }

    .topo {
      width: 100%;
      max-width: 500px;
      height: auto;
      display: block;
      margin: 0 auto 30px auto;
    }

    .email-box {
      width: 100%;
      max-width: 320px;
      padding: 14px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      border: 2px solid #000;
      border-radius: 10px;
      box-sizing: border-box;
      margin-bottom: 15px;
      color: #000;
    }

    .botao {
      width: 100%;
      max-width: 320px;
      height: auto;
      display: block;
      margin: 0 auto;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
    }

    .botao img {
      width: 100%;
      display: block;
    }

    .aviso {
      margin-top: 35px;
      font-weight: bold;
      line-height: 1.5;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style></head>
<body>
  <div class="container">
    <img src="topo01.png" alt="Tele Tudo" class="topo" /><form action="https://script.google.com/macros/s/AKfycbzdgJwzcA2F8_3VmcmSl_svpju1rtI-oFy-0QBv_I7i79fiGLI4Gb99fe6WGaR0RT6O/exec" method="POST" target="_blank">
  <input 
    type="email" 
    name="email" 
    placeholder="Digite seu e-mail"
    class="email-box"
    required
  >

  <button type="submit" class="botao">
    <img src="botao01.png" alt="Cadastrar" />
  </button>
</form>

<p class="aviso">
  🚨Para acessar o grupo com as mídias deve ter instalado no seu telefone o Telegram!
</p>

  </div>
</body>
</html>
